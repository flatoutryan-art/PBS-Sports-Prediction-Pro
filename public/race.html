<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PBS Picks Pro — Leaderboard Race</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0d12; font-family:system-ui,-apple-system,sans-serif; color:#e8e0d0; }
    select,button { font-family:inherit; }
  </style>
</head>
<body>
<div id="root" style="max-width:520px;margin:0 auto;padding:16px 12px;min-height:100vh">

  <div id="loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:12px">
    <div style="font-size:40px">⚽</div>
    <div style="font-size:12px;letter-spacing:4px;color:#C9A84C;text-transform:uppercase">Loading tournament data…</div>
    <div id="load-status" style="font-size:11px;color:#4B5563;margin-top:4px"></div>
  </div>

  <div id="app" style="display:none">

    <div style="text-align:center;margin-bottom:14px">
      <div style="font-size:10px;letter-spacing:4px;color:#C9A84C;text-transform:uppercase;margin-bottom:3px">PBS PICKS PRO · WORLD CUP 2026</div>
      <div style="font-size:22px;font-weight:800;letter-spacing:3px;text-transform:uppercase">🏆 LEADERBOARD RACE</div>
    </div>

    <div style="background:#1a1f2e;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:10px">
      <div style="min-width:0">
        <div id="match-num" style="font-size:9px;color:#6B7280;letter-spacing:2px;text-transform:uppercase"></div>
        <div id="match-name" style="font-size:14px;font-weight:700;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
        <div id="match-date" style="font-size:10px;color:#6B7280;margin-top:2px"></div>
      </div>
      <div id="stage-badge" style="border-radius:20px;padding:4px 12px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;color:#fff"></div>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
      <button id="btnView" onclick="toggleView()" style="background:#1a1f2e;color:#e8e0d0;border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;flex-shrink:0">📊 Bars</button>
      <div id="view-label" style="flex:1;font-size:10px;color:#6B7280;text-align:center">Bump chart — rank over time</div>
      <select id="topN" onchange="render()" style="background:#1a1f2e;color:#e8e0d0;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:5px 8px;font-size:11px;flex-shrink:0">
        <option value="5">Top 5</option>
        <option value="10" selected>Top 10</option>
        <option value="15">Top 15</option>
        <option value="25">All 25</option>
      </select>
    </div>

    <div id="chart-area" style="margin-bottom:12px;position:relative;min-height:280px"></div>

    <div style="height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-bottom:14px;overflow:hidden">
      <div id="progress-bar" style="height:100%;background:linear-gradient(90deg,#C9A84C66,#C9A84C);transition:width 0.3s ease;border-radius:2px;width:0%"></div>
    </div>

    <div id="final-banner" style="display:none;margin-bottom:14px;text-align:center;background:linear-gradient(135deg,#C9A84C18,#C9A84C08);border:1px solid #C9A84C44;border-radius:12px;padding:14px">
      <div style="font-size:20px;font-weight:800;color:#C9A84C;letter-spacing:2px">🏆 TOURNAMENT COMPLETE!</div>
      <div id="winner-text" style="font-size:12px;color:#9CA3AF;margin-top:6px"></div>
    </div>

    <div style="display:flex;gap:6px;justify-content:center;margin-bottom:10px;flex-wrap:wrap">
      <button onclick="jumpStart()" style="background:#1a1f2e;color:#e8e0d0;border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer">⏮</button>
      <button onclick="stepBack()" style="background:#1a1f2e;color:#e8e0d0;border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer">◀</button>
      <button id="playBtn" onclick="togglePlay()" style="background:#C9A84C;color:#0a0d12;border:none;border-radius:8px;padding:7px 20px;font-size:13px;font-weight:700;cursor:pointer;min-width:90px">▶ Play</button>
      <button onclick="stepFwd()" style="background:#1a1f2e;color:#e8e0d0;border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer">▶</button>
      <button onclick="jumpEnd()" style="background:#1a1f2e;color:#e8e0d0;border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer">⏭</button>
    </div>

    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <select id="speed" style="background:#1a1f2e;color:#e8e0d0;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:5px 10px;font-size:11px">
        <option value="2000">🐢 Slow</option>
        <option value="1000" selected>Normal</option>
        <option value="400">⚡ Fast</option>
        <option value="120">🚀 Turbo</option>
      </select>
    </div>

    <div style="text-align:center;margin-top:20px;font-size:10px;color:#374151;letter-spacing:2px">
      PBS PICKS PRO · WORLD CUP 2026 · pbspredictions.netlify.app
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://kikwlrbqptewcjldxglk.supabase.co";
// Current, rotated anon key (matches the one live in race.html since the 07-16 key fix).
// If this ever 401s again with "Invalid API key", the key was rotated again —
// go to Settings -> API, copy the anon/public key fresh, and swap it in here.
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtpa3dscmJxcHRld2NqbGR4Z2xrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0ODYwODYsImV4cCI6MjA5NjA2MjA4Nn0.GF593eru9Pubxu4MuOf0z5GrYV_-kw3drfDu7Be27WA";

const COLORS = ["#C9A84C","#3B82F6","#10B981","#EF4444","#8B5CF6","#EC4899","#F59E0B","#06B6D4","#F97316","#84CC16","#E879F9","#38BDF8","#FB923C","#A78BFA","#34D399","#FCD34D","#F472B6","#60A5FA","#4ADE80","#C084FC","#FF6B6B","#7DD3FC","#86EFAC","#FCA5A5","#67E8F9"];

const STAGE_COLORS = {group:"#374151",last_32:"#1D4ED8",last_16:"#7C3AED",qf:"#B45309",sf:"#DC2626","3rd":"#6B7280",final:"#C9A84C"};
const STAGE_LABELS = {group:"Group Stage",last_32:"Round of 32",last_16:"Round of 16",qf:"Quarter-Final",sf:"Semi-Final","3rd":"3rd Place",final:"Final"};

let snapshots=[], colorMap={}, currentIdx=0, playing=false, timer=null, viewMode="bump";

async function loadData() {
  try {
    let allRows=[], offset=0;
    while(true) {
      document.getElementById("load-status").textContent = `Fetched ${allRows.length} predictions…`;
      // Uses the race_data view (created 2026-07-16) which anon can read directly —
      // NOT the raw predictions/profiles/fixtures tables, which RLS blocks for anon.
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/race_data?select=*&order=kickoff_at.asc&limit=1000&offset=${offset}`,
        { headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` } }
      );
      if(!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
      const rows = await res.json();
      if(!Array.isArray(rows)) throw new Error("Unexpected response: "+JSON.stringify(rows).slice(0,200));
      allRows = allRows.concat(rows);
      if(rows.length < 1000) break;
      offset += 1000;
    }
    if(allRows.length === 0) throw new Error("No settled predictions found in database");
    process(allRows);
  } catch(e) {
    document.getElementById("loading").innerHTML = `
      <div style="color:#EF4444;text-align:center;padding:20px;line-height:1.6">
        <div style="font-size:28px;margin-bottom:12px">⚠️</div>
        <div style="font-size:13px;margin-bottom:8px">Could not load data</div>
        <div style="font-size:11px;color:#6B7280;word-break:break-all">${e.message}</div>
      </div>`;
  }
}

function process(raw) {
  const matchOrder=[], matchSeen=new Set(), allPlayers=new Set();
  const officialTotals={}; // authoritative app leaderboard totals — these win over our own math
  raw.forEach(row => {
    const player=row.display_name, home=row.home_team, away=row.away_team;
    if(!player||!home||!away) return;
    allPlayers.add(player);
    if(row.official_total_points!=null) officialTotals[player]=row.official_total_points;
    const key=`${row.kickoff_at}|${home}|${away}`;
    if(!matchSeen.has(key)){ matchSeen.add(key); matchOrder.push({key,kickoff:row.kickoff_at,home,away,stage:row.stage}); }
  });

  const players=[...allPlayers].sort();
  players.forEach((p,i)=>{ colorMap[p]=COLORS[i%COLORS.length]; });

  const running={};
  players.forEach(p=>{ running[p]=0; });

  snapshots = matchOrder.map(({key,kickoff,home,away,stage})=>{
    raw.forEach(row=>{
      if(`${row.kickoff_at}|${row.home_team}|${row.away_team}`!==key) return;
      const player=row.display_name;
      if(player && running[player]!==undefined) running[player]+=(row.points_earned??0);
    });
    return {match:`${home} vs ${away}`,kickoff,stage,totals:{...running}};
  });

  // The app's leaderboard is the official, already-finalized record.
  // Force the LAST snapshot to match it exactly, so the final standings
  // shown here always agree with the app — any historical manual
  // adjustments to a player's stored total (made in the app, not visible
  // in the raw predictions math) are respected rather than overridden.
  // Earlier match-by-match snapshots still use the computed running sum,
  // since those are just the season's progression, not the official record.
  if(snapshots.length){
    const last=snapshots[snapshots.length-1];
    players.forEach(p=>{
      if(officialTotals[p]!=null) last.totals[p]=officialTotals[p];
    });
  }

  document.getElementById("loading").style.display="none";
  document.getElementById("app").style.display="block";
  render();
}

function getRankings(snap,n){
  return Object.entries(snap.totals).sort((a,b)=>b[1]-a[1]).slice(0,n);
}

function render(){
  if(!snapshots.length) return;
  const snap=snapshots[currentIdx];
  const n=parseInt(document.getElementById("topN").value);
  const rankings=getRankings(snap,n);
  const isFinal=currentIdx===snapshots.length-1;

  document.getElementById("match-num").textContent=`Match ${currentIdx+1} of ${snapshots.length}`;
  document.getElementById("match-name").textContent=snap.match;
  document.getElementById("match-date").textContent=snap.kickoff
    ? new Date(snap.kickoff).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : "";
  const sb=document.getElementById("stage-badge");
  sb.textContent=STAGE_LABELS[snap.stage]??snap.stage??"";
  sb.style.background=STAGE_COLORS[snap.stage]??"#374151";
  document.getElementById("progress-bar").style.width=`${((currentIdx+1)/snapshots.length)*100}%`;
  document.getElementById("final-banner").style.display=isFinal?"block":"none";
  if(isFinal && rankings[0]) document.getElementById("winner-text").textContent=`${rankings[0][0]} wins PBS Picks Pro 2026 with ${rankings[0][1]} pts! 🎉`;
  viewMode==="bump" ? renderBump(rankings,n,snap) : renderBars(rankings,snap);
}

function renderBump(rankings, n, snap) {
  const area = document.getElementById("chart-area");
  const containerW = area.offsetWidth || 460;
  // Row height stays compact regardless of how many rows are shown —
  // previously this scaled up to 36px+ which then drove font size up to
  // 24px, far too large for a phone screen and overlapping the chart.
  const rowH = Math.max(20, Math.min(28, Math.floor(320 / n)));
  const h = rowH * n + 24;

  const colWidth = 40;
  const leftPad = 14;
  const labelW = 104; // tighter reserved overlay width, sized for mobile
  const plotVisibleW = Math.max(90, containerW - labelW);

  const xS = i => leftPad + i * colWidth;
  const yS = r => 12 + r * rowH;

  const topPlayers = rankings.map(([p]) => p);
  const paths = {};
  topPlayers.forEach(p => { paths[p] = []; });

  for (let i = 0; i <= currentIdx; i++) {
    const s = snapshots[i];
    const sorted = Object.entries(s.totals).sort((a, b) => b[1] - a[1]);
    topPlayers.forEach(p => {
      const rank = sorted.findIndex(([name]) => name === p);
      if (rank !== -1) paths[p].push({ x: xS(i), y: yS(Math.min(rank, n - 1)), pts: s.totals[p] });
    });
  }

  const svgW = xS(currentIdx) + colWidth * 3;

  let svg = `<svg width="${svgW}" height="${h}" style="display:block">`;

  let lastStage = null, bandStart = 0;
  const alphas = { group:"06", last_32:"0A", last_16:"0E", qf:"12", sf:"14", "3rd":"08", final:"1A" };
  for (let i = 0; i <= currentIdx + 1; i++) {
    const stage = i <= currentIdx ? snapshots[i].stage : null;
    if (stage !== lastStage && lastStage !== null) {
      const x1 = xS(bandStart), x2 = xS(i - 1) + colWidth;
      svg += `<rect x="${x1}" y="0" width="${Math.max(0,x2-x1)}" height="${h}" fill="${STAGE_COLORS[lastStage]??'#374151'}${alphas[lastStage]??"08"}"/>`;
    }
    if (stage !== lastStage) { bandStart = i; lastStage = stage; }
  }

  for (let i = 0; i <= currentIdx; i++) {
    svg += `<line x1="${xS(i).toFixed(1)}" y1="0" x2="${xS(i).toFixed(1)}" y2="${h}" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>`;
  }

  const cx = xS(currentIdx).toFixed(1);
  svg += `<line x1="${cx}" y1="0" x2="${cx}" y2="${h}" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>`;

  [...topPlayers].reverse().forEach(p => {
    const pts = paths[p];
    if (pts.length < 2) return;
    const color = colorMap[p] ?? "#94A3B8";
    let d = `M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
    for (let i = 1; i < pts.length; i++) {
      const prev = pts[i-1], cur = pts[i];
      const midX = (prev.x + cur.x) / 2;
      d += ` C${midX.toFixed(1)},${prev.y.toFixed(1)} ${midX.toFixed(1)},${cur.y.toFixed(1)} ${cur.x.toFixed(1)},${cur.y.toFixed(1)}`;
    }
    svg += `<path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>`;
  });

  const curSorted = Object.entries(snap.totals).sort((a, b) => b[1] - a[1]);
  topPlayers.forEach(p => {
    const rank = curSorted.findIndex(([name]) => name === p);
    if (rank < 0 || rank >= n) return;
    const color = colorMap[p] ?? "#94A3B8";
    svg += `<circle cx="${cx}" cy="${yS(rank)}" r="4.5" fill="${color}" stroke="#0a0d12" stroke-width="2"/>`;
  });

  svg += `</svg>`;

  // Fixed, small font sizes — deliberately NOT derived from rowH, so they
  // stay legible and don't overlap regardless of how many rows are shown.
  const nameFs = 11, ptsFs = 11, rankFs = 9;
  let labelsHtml = "";
  topPlayers.forEach(p => {
    const rank = curSorted.findIndex(([name]) => name === p);
    if (rank < 0 || rank >= n) return;
    const color = colorMap[p] ?? "#94A3B8";
    const medal = rank === 0 ? "🥇" : rank === 1 ? "🥈" : rank === 2 ? "🥉" : null;
    const rankColor = rank===0?'#C9A84C':rank===1?'#94A3B8':rank===2?'#B45309':'#4B5563';
    // First name only, hard-capped length — avoids long names pushing
    // points off the edge or wrapping onto a second line.
    const short = (p.split(' ')[0] || p).slice(0, 9);
    labelsHtml += `<div style="position:absolute;top:${yS(rank)-nameFs/2-1}px;right:4px;left:4px;display:flex;align-items:center;justify-content:flex-end;gap:4px;white-space:nowrap;overflow:hidden">
      <span style="font-size:${rankFs}px;font-weight:700;color:${rankColor};width:13px;text-align:right;flex-shrink:0">${medal ?? rank+1}</span>
      <span style="font-size:${nameFs}px;font-weight:${rank<3?'700':'500'};color:${rank<3?'#e8e0d0':'#9CA3AF'};overflow:hidden;text-overflow:ellipsis;max-width:56px">${short}</span>
      <span style="font-size:${ptsFs}px;font-weight:700;color:${color};flex-shrink:0;min-width:20px;text-align:right">${snap.totals[p]}</span>
    </div>`;
  });

  area.style.height = `${h}px`;
  area.innerHTML = `
    <div id="bump-scroll" style="overflow-x:auto;overflow-y:hidden;width:100%;height:100%;-ms-overflow-style:none;scrollbar-width:none">${svg}</div>
    <div style="position:absolute;top:0;right:0;width:${labelW}px;height:${h}px;background:linear-gradient(90deg, rgba(10,13,18,0) 0%, rgba(10,13,18,0.92) 35%, rgba(10,13,18,0.98) 100%);pointer-events:none">${labelsHtml}</div>
    <style>#bump-scroll::-webkit-scrollbar{display:none}</style>
  `;

  const scrollEl = document.getElementById("bump-scroll");
  const target = Math.max(0, xS(currentIdx) - plotVisibleW + colWidth * 1.5);
  scrollEl.scrollTo({ left: target, behavior: playing ? "smooth" : "auto" });
}

function renderBars(rankings,snap){
  const maxPts=rankings[0]?.[1]??1;
  let html="";
  rankings.forEach(([player,points],i)=>{
    const color=colorMap[player]??"#94A3B8";
    const pct=Math.max(3,(points/maxPts)*100);
    const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":null;
    html+=`<div style="margin-bottom:6px;display:flex;align-items:center;gap:6px">
      <div style="width:22px;text-align:right;font-size:10px;font-weight:700;flex-shrink:0;color:${i===0?'#C9A84C':i===1?'#94A3B8':i===2?'#B45309':'#4B5563'}">${medal??i+1}</div>
      <div style="width:90px;font-size:11px;font-weight:${i<3?'700':'500'};flex-shrink:0;color:${i<3?'#e8e0d0':'#9CA3AF'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${player}</div>
      <div style="flex:1;background:rgba(255,255,255,0.04);border-radius:4px;height:22px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,${color}77,${color});border-radius:4px;transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1);display:flex;align-items:center;justify-content:flex-end;padding-right:6px;min-width:28px">
          <span style="font-size:10px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.9)">${points}</span>
        </div>
      </div>
    </div>`;
  });
  document.getElementById("chart-area").innerHTML=html;
}

function toggleView(){
  viewMode=viewMode==="bump"?"bars":"bump";
  document.getElementById("btnView").textContent=viewMode==="bump"?"📊 Bars":"📈 Bump";
  document.getElementById("view-label").textContent=viewMode==="bump"?"Bump chart — rank over time":"Bar chart — points";
  render();
}

function jumpStart(){stopPlay();currentIdx=0;render();}
function jumpEnd(){stopPlay();currentIdx=snapshots.length-1;render();}
function stepBack(){stopPlay();if(currentIdx>0){currentIdx--;render();}}
function stepFwd(){stopPlay();if(currentIdx<snapshots.length-1){currentIdx++;render();}}

function togglePlay(){if(playing)stopPlay();else startPlay();}

function startPlay(){
  if(currentIdx>=snapshots.length-1) currentIdx=0;
  playing=true;
  const pb=document.getElementById("playBtn");
  pb.textContent="⏸ Pause"; pb.style.background="#7B1C35"; pb.style.color="#e8e0d0";
  const spd=parseInt(document.getElementById("speed").value);
  timer=setInterval(()=>{
    if(currentIdx>=snapshots.length-1){stopPlay();return;}
    currentIdx++; render();
  },spd);
}

function stopPlay(){
  clearInterval(timer); playing=false;
  const pb=document.getElementById("playBtn");
  pb.textContent="▶ Play"; pb.style.background="#C9A84C"; pb.style.color="#0a0d12";
}

loadData();
</script>
</body>
</html>
